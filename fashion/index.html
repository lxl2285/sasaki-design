    <style>
        :root { 
            --gold-accent: #b89c6c; 
            --deep-charcoal: #121212; 
            --off-white: #fafafa; 
            --text-main: #333333;
            --text-sub: #777777;
            --border-color: #eaeaea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #fff; 
            color: var(--text-main); 
            line-height: 1.8; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 { 
            font-family: 'Playfair Display', serif; 
            font-weight: 400; 
            letter-spacing: 0.2em; 
            text-transform: uppercase;
            color: var(--deep-charcoal);
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 50px; }
        
        nav { padding: 40px 0; border-bottom: 1px solid var(--border-color); background: #fff; position: sticky; top: 0; z-index: 1000; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.6rem; font-weight: 500; letter-spacing: 0.4em; color: var(--deep-charcoal); text-decoration: none; }
        .nav-meta { font-size: 0.75rem; color: var(--gold-accent); letter-spacing: 0.15em; }

        header { padding: 150px 0; text-align: center; background-color: var(--off-white); margin-bottom: 100px; position: relative; }
        header::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 1px; height: 80px; background: var(--border-color); }
        header h1 { font-size: 3.5rem; letter-spacing: 0.25em; margin-bottom: 25px; line-height: 1.2; }
        header p { color: var(--gold-accent); letter-spacing: 0.3em; font-size: 0.95rem; }

        section { padding: 120px 0; border-bottom: 1px solid var(--border-color); }
        .section-title { font-size: 2.2rem; text-align: center; margin-bottom: 90px; color: var(--gold-accent); }
        .section-sub { font-size: 0.8rem; text-align: center; color: var(--text-sub); margin-top: -80px; margin-bottom: 90px; letter-spacing: 0.1em; }

        .profile-grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 100px; align-items: center; }
        .ceo-img-container { position: relative; }
        .ceo-img { width: 100%; height: auto; display: block; filter: contrast(1.02); }
        .ceo-img-container::before { content: ''; position: absolute; top: 20px; left: 20px; width: 100%; height: 100%; border: 1px solid var(--gold-accent); z-index: -1; }
        .ceo-text h3 { font-size: 1.5rem; margin-bottom: 35px; letter-spacing: 0.1em; }
        .ceo-text p { font-size: 1.05rem; margin-bottom: 25px; text-align: justify; color: #444; font-weight: 300; }

        .philosophy { background-color: var(--deep-charcoal); color: #fff; text-align: center; padding: 160px 0; border: none; }
        .philosophy blockquote { font-size: 2rem; font-weight: 300; letter-spacing: 0.15em; margin-bottom: 40px; color: #fff; font-family: 'Playfair Display', serif; font-style: italic;}
